<div
  class="bg-gray-800 rounded-xl overflow-hidden cursor-pointer hover:-translate-y-1 transition-transform duration-200 border border-gray-700 hover:border-violet-500"
  [routerLink]="['/games', game.id]">
  <img
    [src]="game.cover || 'assets/no-cover.png'"
    [alt]="game.name"
    class="w-full aspect-[3/4] object-cover"
  />
  <div class="p-3">
    <h3 class="text-white text-sm font-medium leading-tight mb-1 line-clamp-2">{{ game.name }}</h3>
    @if (game.rating) {
      <span class="text-yellow-400 text-xs">⭐ {{ game.rating }}/10</span>
    }
    @if (game.release_date) {
      <span class="text-gray-500 text-xs ml-2">{{ game.release_date }}</span>
    }
    @if (game.platforms.length) {
      <p class="text-gray-500 text-xs mt-1 truncate">{{ game.platforms.slice(0, 2).join(', ') }}</p>
    }
  </div>
</div>
