<div class="relative">
  <button
    (click)="toggle()"
    class="relative text-gray-400 hover:text-white transition-colors p-1">
    🔔
    @if (pending.length > 0) {
      <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">
        {{ pending.length }}
      </span>
    }
  </button>

  @if (open) {
    <div class="absolute top-10 right-0 w-80 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl z-50 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
        <span class="text-white font-semibold text-sm">Notificaciones</span>
        <button (click)="open = false" class="text-gray-500 hover:text-white text-xs">✕</button>
      </div>

      @if (pending.length === 0) {
        <p class="text-gray-500 text-sm p-4 text-center">Sin notificaciones</p>
      }

      @for (req of pending; track req.id) {
        <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-800 last:border-0">
          <div class="w-9 h-9 rounded-full overflow-hidden bg-gray-700 flex-shrink-0 flex items-center justify-center">
            @if (req.sender.avatar_url) {
              <img [src]="req.sender.avatar_url" class="w-full h-full object-cover" />
            } @else {
              <span>👤</span>
            }
          </div>

          <div class="flex-1 min-w-0">
            <p class="text-white text-sm">
              <span class="font-semibold">{{ req.sender.name }}</span>
              quiere ser tu amigo
            </p>
          </div>

          <div class="flex gap-2 flex-shrink-0">
            <button
              (click)="accept(req.id)"
              class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded-lg transition-colors">
              ✓
            </button>
            <button
              (click)="reject(req.id)"
              class="text-xs bg-red-700 hover:bg-red-600 text-white px-2 py-1 rounded-lg transition-colors">
              ✕
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>
