@if (isLoggedIn) {
  <nav class="bg-gray-900 border-b border-gray-800 px-6 h-14 flex items-center gap-4">
    <a routerLink="/games" class="text-white font-bold text-lg mr-auto">🎮 Gamelist</a>

    <div class="flex gap-4 items-center">
      <a routerLink="/games" routerLinkActive="text-violet-400"
         class="text-gray-400 hover:text-white text-sm transition-colors">
        Buscar
      </a>
      <a routerLink="/my-list" routerLinkActive="text-violet-400"
         class="text-gray-400 hover:text-white text-sm transition-colors">
        Mi perfil
      </a>

      <!-- Botón juego aleatorio -->
      <button
        (click)="goRandom()"
        class="text-sm px-3 py-1 rounded-lg border border-gray-700 text-gray-400 transition-all duration-300 hover:border-violet-500 hover:text-violet-400 hover:bg-violet-500/10 hover:shadow-lg hover:shadow-violet-500/20">
        🎲 Aleatorio
      </button>
    </div>

    <app-user-search />
    <app-notifications />

    <div class="flex items-center gap-3 ml-2">
      <span class="text-gray-400 text-sm">{{ userName }}</span>
      <button
        (click)="logout()"
        class="text-sm border border-gray-700 text-gray-400 hover:bg-red-600 hover:text-white hover:border-red-600 px-3 py-1 rounded-lg transition-colors">
        Salir
      </button>
    </div>
  </nav>
}
